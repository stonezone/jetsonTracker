# =====================================================================
# WAVECAM — Orin SERVO config (camera WILL move)
# PTZ enabled + YOLO enabled (real TensorRT engine) so it locks the
# orange-confirmed person target.
# =====================================================================

camera:
  source: "rtsp://192.168.100.88:554/2"
  use_gstreamer: false
  codec: "h264"
  reconnect_sec: 2.0

ptz:
  enabled: true
  ip: "192.168.100.88"
  port: 1259
  address: 1
  reset_sequence: true
  invert_pan: false
  invert_tilt: false
  deadzone: 0.05
  max_pan_speed: 10
  max_tilt_speed: 12
  min_speed: 1
  command_min_interval: 0.05
  ff_gain: 0.0
  ff_deadzone_mult: 1.5

camera_ai:
  disable_on_start: true  # safer default: Prisual onboard tracker fights our loop (review 2026-06-12)
  http_base: "http://192.168.100.88"
  # Probed live 2026-06-12: param.cgi with get_/post_ prefixes, basic auth.
  # post_aimode&off -> {"status":"200"}; get_aimode -> "get_aimode=Off".
  off_path: "/cgi-bin/param.cgi?post_aimode&off"
  verify_path: "/cgi-bin/param.cgi?get_aimode"

color:
  enabled: true
  preset: "orange_red"
  min_area: 60
  max_area: 200000
  hsv_ranges:
    red_low_1: [0, 140, 80]
    red_high_1: [12, 255, 255]
    red_low_2: [170, 140, 80]
    red_high_2: [180, 255, 255]
    orange_low: [8, 140, 100]
    orange_high: [28, 255, 255]
  morph_kernel: 5

detector:
  enabled: true
  model: "/data/projects/gimbal/models/yolo11n.engine"
  conf: 0.35
  imgsz: 640
  person_class: 0
  every_n: 3
  # 0.2 (was 0.6): reused boxes carry no motion compensation and confirm
  # phantoms during pans (audit 2026-07-01 M5/Wave-1 follow-up).
  box_ttl_sec: 0.2

fusion:
  require_person: false
  match_dist: 120
  lock_threshold: 0.60
  unlock_threshold: 0.35
  ema_alpha: 0.5
  lost_grace_sec: 0.8
  person_aim_x: 0.5
  person_aim_y: 0.5
  match_dist_scale: false  # flag-off: scale match_dist by subject bbox height (review 2026-06-12)
  gps_boost: 0.2
  gps_boost_radius_frac: 0.25
  gps_roi_enabled: false  # flag-off: enable after field validation

web:
  host: "0.0.0.0"
  port: 8088
  jpeg_quality: 70
  show_hud: true

loop:
  target_fps: 35
  log_every_sec: 5.0

gps:
  enabled: true
  # direct_lora is the LIVE GPS transport (custom firmware/direct-lora/ firmware on
  # both Wios); the legacy Meshtastic module is retired (audit 2026-07-01 L3). The
  # live rig overlay (/data/projects/gimbal/wavecam/config.local.yaml) may still
  # override this, but the checked-in default must not silently fall back to
  # Meshtastic if the overlay is ever absent.
  source: direct_lora
  # direct_lora reads direct_dev_path (run.py); plain dev_path is the legacy
  # Meshtastic key and is a no-op here (audit 2026-07-01) — set the base Wio port here.
  direct_dev_path: /dev/ttyACM0
  stale_threshold_sec: 45
  drive_stale_sec: 8.0  # drive-stale gate (tighter than display stale); review 2026-06-12
  drive_zoom: false

estimator:
  enabled: true
  shadow: true

sensors:
  # Phase-3 phone-on-tripod diagnostic ingest. enabled=False discards every POST
  # silently (route still returns 200), so /status.sensors never populates and the
  # iOS Sensors panel shows nothing even though the phone is posting. Must be true
  # for SensorHub to cache phone samples. (2026-06-16: was defaulting off.)
  enabled: true
  drift_alert_deg: 12.0
