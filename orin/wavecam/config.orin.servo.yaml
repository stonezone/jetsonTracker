# =====================================================================
# WAVECAM — Orin SERVO config (camera WILL move)
# PTZ enabled + YOLO enabled (real TensorRT engine) so it locks the
# orange-confirmed person target.
# =====================================================================

camera:
  source: "rtsp://192.168.100.88:554/2"
  use_gstreamer: false
  codec: "h264"
  reconnect_sec: 2.0

ptz:
  enabled: true
  ip: "192.168.100.88"
  port: 1259
  address: 1
  reset_sequence: true
  invert_pan: false
  invert_tilt: false
  deadzone: 0.05
  max_pan_speed: 10
  max_tilt_speed: 12
  min_speed: 1
  command_min_interval: 0.05
  ff_gain: 0.0
  ff_deadzone_mult: 1.5

camera_ai:
  disable_on_start: false
  http_base: "http://192.168.100.88"
  off_path: "/cgi-bin/ptzctrl.cgi?ptzcmd&aimode&off"

color:
  enabled: true
  preset: "orange_red"
  min_area: 60
  max_area: 200000
  hsv_ranges:
    red_low_1: [0, 140, 80]
    red_high_1: [12, 255, 255]
    red_low_2: [170, 140, 80]
    red_high_2: [180, 255, 255]
    orange_low: [8, 140, 100]
    orange_high: [28, 255, 255]
  morph_kernel: 5

detector:
  enabled: true
  model: "/data/projects/gimbal/models/yolov8n.engine"
  conf: 0.35
  imgsz: 640
  person_class: 0
  every_n: 3
  box_ttl_sec: 0.6

fusion:
  require_person: false
  match_dist: 120
  lock_threshold: 0.60
  unlock_threshold: 0.35
  ema_alpha: 0.5
  lost_grace_sec: 0.8
  person_aim_x: 0.5
  person_aim_y: 0.5

web:
  host: "0.0.0.0"
  port: 8088
  jpeg_quality: 70

loop:
  target_fps: 25
  log_every_sec: 5.0
