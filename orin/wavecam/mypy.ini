# Scoped type gate for the pointing-math seams (hardening plan Phase 0).
# The 2026-06-11 zombie bug (missing CameraPose inverse, concealed by test
# fakes) is this gate's reason to exist. Scope is the explicit list below;
# widening it is a deliberate decision, not a default.
[mypy]
python_version = 3.10
files =
    wavecam/protocols.py,
    wavecam/_protocol_conformance.py,
    wavecam/camera_pose.py,
    wavecam/gps_geo.py,
    wavecam/ptz_state.py,
    wavecam/ptz_visca.py,
    wavecam/pointing_verifier.py
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True
# estimator/tracking_arbiter consume the seams but carry numpy-optional and
# legacy untyped internals; they get checked as importers, not strict targets.
follow_imports = silent
ignore_missing_imports = True

[mypy-wavecam.camera_pose]
disallow_untyped_defs = True

[mypy-wavecam.gps_geo]
disallow_untyped_defs = False
