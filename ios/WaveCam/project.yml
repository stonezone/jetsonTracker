name: WaveCam
options:
  bundleIdPrefix: com.stonezone
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "27"
    DEVELOPMENT_TEAM: "78725QX6PZ"  # Zack's personal team; contributors override in project.user.yml
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  WaveCam:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stonezone.WaveCam
        INFOPLIST_FILE: Info.plist
    dependencies:
      - target: WaveCamWatch
        embed: true

  WaveCamWatch:
    type: application
    platform: watchOS
    sources:
      - Sources-Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stonezone.WaveCam.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Real generated plist: WKBackgroundModes has NO INFOPLIST_KEY_* build
    # setting — the previous key was silently dropped and wrist-down recording
    # would have died with the screen (review 2026-06-12, HIGH).
    info:
      path: InfoWatch.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.stonezone.WaveCam
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        WKBackgroundModes:
          - workout-processing
        # Plain-HTTP to the rig's LAN/tether IPs — same exception the iOS app
        # carries; without it watchOS blocks every request -> permanent OFFLINE.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSHealthShareUsageDescription: "WaveCam starts a workout session to keep GPS and motion sensors running while the watch face is down during a surf session."
        NSHealthUpdateUsageDescription: "WaveCam records a workout session to keep sensors active during recording."
        NSLocationWhenInUseUsageDescription: "WaveCam records your GPS track during a surf session for offline estimator validation."
    # T4.1: HealthKit entitlement for HKWorkoutSession (background sensor keep-alive)
    entitlements:
      path: WaveCamWatch.entitlements
      properties:
        com.apple.developer.healthkit: YES
        com.apple.developer.healthkit.access: []
