name: WaveCam
options:
  bundleIdPrefix: com.stonezone
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "27"
    DEVELOPMENT_TEAM: "78725QX6PZ"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  WaveCam:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stonezone.WaveCam
        INFOPLIST_FILE: Info.plist
    dependencies:
      - target: WaveCamWatch
        embed: true

  WaveCamWatch:
    type: application
    platform: watchOS
    sources:
      - Sources-Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stonezone.WaveCam.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.stonezone.WaveCam
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        TARGETED_DEVICE_FAMILY: "4"
