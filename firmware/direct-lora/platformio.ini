; Direct LoRa tracker — two firmwares, one board (Seeed Wio Tracker L1).
; Build: `pio run -e tracker` / `pio run -e base`; flash by copying the
; built UF2 onto the DFU drive (double-tap reset). NEVER nRF OTA (bricks).
;
; The board variant (pin aliases D0.., PIN_VBAT, etc.) is vendored by
; ./fetch_variant.sh into variants/seeed_wio_tracker_L1/ — run it once
; before the first build.

[env]
platform = nordicnrf52
board = adafruit_feather_nrf52840   ; same MCU+bootloader family; pins from variant
framework = arduino
board_build.variants_dir = variants
board_build.variant = seeed_wio_tracker_L1
; The Wio bootloader ships S140 7.3.0 (app base 0x27000), but the feather
; board def links for S140 6.1.1 (0x26000) — that 0x1000 offset boot-looped
; the board on first bring-up. Override to a v7 layout. (INFO_UF2.TXT 2026-06-13.)
board_build.ldscript = ld/nrf52840_s140_v7.ld
lib_deps =
    jgromes/RadioLib@^7.1.2
    mikalhart/TinyGPSPlus@^1.1.0
build_flags =
    -Isrc/common
monitor_speed = 115200
; Emit a flashable .uf2 (the base builder only makes .hex + OTA .zip).
extra_scripts = post:tools/uf2_postbuild.py

[env:tracker]
build_src_filter = +<tracker/> +<common/>

[env:base]
build_src_filter = +<base/> +<common/>
