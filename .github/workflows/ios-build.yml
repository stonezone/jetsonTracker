# H14: the iOS app had zero CI — a Swift compile break only surfaced on the
# next Mac build. This compiles the app (+ embedded WaveCamWatch) unsigned;
# it does NOT replace build-device.sh, which remains the install path.
name: iOS build

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # The app builds against the iOS 26 SDK (Theme+Glass.swift uses the Liquid
      # Glass APIs — glassEffect/GlassEffectContainer — behind iOS-26 availability
      # guards; deployment target stays iOS 17). macos-latest's default xcode-select
      # is not always the newest installed Xcode, so a run can land on an older SDK
      # where those symbols don't exist and fail to compile. Select the newest Xcode.
      - name: Select newest Xcode (iOS 26 SDK for Liquid Glass)
        run: |
          NEWEST="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          echo "Selecting $NEWEST"
          sudo xcode-select -s "$NEWEST/Contents/Developer"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios/WaveCam && xcodegen generate

      - name: Build (unsigned, generic iOS destination)
        # CODE_SIGNING_ALLOWED=NO: no signing identity on the runner; the
        # personal DEVELOPMENT_TEAM in project.yml must not be required to
        # compile. Building the WaveCam scheme also builds the embedded
        # WaveCamWatch target.
        run: |
          cd ios/WaveCam
          xcodebuild build \
            -project WaveCam.xcodeproj \
            -scheme WaveCam \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
