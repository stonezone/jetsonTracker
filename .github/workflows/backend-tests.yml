name: Backend tests

on:
  push:
    paths:
      - 'orin/wavecam/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'orin/wavecam/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10 (rig parity — Orin runs 3.10.12, JetPack 6.x)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Minimal set derived from test imports.
        # torch/ultralytics: detector.py imports ultralytics lazily (inside a method);
        #   test_fusion/test_controller_extra assert cv2-free import and pass without them.
        # meshtastic: gps_meshtastic.py imports it inside a try/except; tests use stubs.
        # cv2 (opencv-python): color_detector/capture/overlay import it at module level,
        #   and test_color.py uses it directly, so it IS required.
        # httpx: pulled in transitively by fastapi[testclient] (starlette dep); listed
        #   explicitly for clarity — TestClient uses it for the HTTP transport.
        run: |
          pip install \
            "fastapi<1" \
            "pydantic>=2,<3" \
            pyyaml \
            httpx \
            pytest \
            "opencv-python" \
            "numpy<3"

      - name: Type-check the pointing seams (hardening Phase 0)
        run: |
          pip install "mypy<2"
          cd orin/wavecam && python -m mypy --config-file mypy.ini

      - name: Compile-check tools and package
        # tools/ are deploy-critical scripts the suite never imports; a syntax
        # error there only surfaced on the rig (FOV tool, 2026-06-11).
        run: |
          python -m compileall -q orin/wavecam/tools orin/wavecam/wavecam

      - name: Run backend test suite
        run: cd orin/wavecam && python -m pytest -q
